version: 1.0
runtime: python11
build:
  commands:
    build:
      - npm install --prefix frontend
      - npm run build --prefix frontend
      - pip install -r requirements.txt
  secrets:
    SERPER_API_KEY: SERPER_API_KEY
    TAVILY_API_KEY: TAVILY_API_KEY
    BEDROCK_API_KEY: BEDROCK_API_KEY
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY

run:
  runtime-version: 3.11.9
  command: uvicorn api.server:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: PORT
  env:
    - name: SERPER_API_KEY
      value-from: SERPER_API_KEY
    - name: TAVILY_API_KEY
      value-from: TAVILY_API_KEY
    - name: BEDROCK_API_KEY
      value-from: BEDROCK_API_KEY
    - name: BEDROCK_MODEL_ID
      value: us.anthropic.claude-sonnet-4-5-20250929-v1:0
    - name: AWS_DEFAULT_REGION
      value: us-east-1
    - name: AWS_ACCESS_KEY_ID
      value-from: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      value-from: AWS_SECRET_ACCESS_KEY

observability:
  tracing: awsxray

logs:
  engine: awslogs
  configuration:
    log-group-name: /aws/apprunner/trend-sku-translator
